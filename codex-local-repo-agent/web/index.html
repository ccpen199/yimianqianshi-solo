<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent 本地仓库提问工作台（Codex 模块）</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <main class="container">
    <header class="hero card">
      <h1>Agent 本地仓库提问工作台（Codex 模块）</h1>
      <p>流程：1) 选 Provider 2) 添加/复用本地仓库 3) 运行提问建议 Agent 或自定义提问</p>
    </header>

    <nav class="tab-nav" aria-label="页面标签">
      <button class="tab-btn active" data-tab="workbench" type="button">Agent 工作台</button>
      <button class="tab-btn" data-tab="research" type="button">全球产品分类与命名</button>
    </nav>

    <section id="tab-workbench" class="tab-panel active">
      <section class="card stack">
        <h2>Step 0. 连接配置</h2>
        <div class="grid two">
          <label>API Base
            <input id="apiBase" value="http://127.0.0.1:3000" />
          </label>
          <label>API Token（可空）
            <input id="apiToken" placeholder="Bearer token（可选）" />
          </label>
        </div>
        <div class="actions">
          <button id="btnLoadProviders" class="btn primary">加载 Provider</button>
        </div>
        <pre id="providerState" class="log">尚未加载</pre>
      </section>

      <section class="card stack">
        <h2>Step 1. 添加或复用本地仓库</h2>
        <div class="grid two">
          <label>仓库绝对路径
            <div class="input-with-action">
              <input id="repoPath" data-default-path="/Users/chen/Desktop/Cursor_project/ai_money/yimianqianshi" value="/Users/chen/Desktop/Cursor_project/ai_money/yimianqianshi" />
              <button id="btnPickRepoPath" class="btn" type="button">填入当前项目路径</button>
            </div>
          </label>
          <label>仓库名称（可空，默认目录名）
            <input id="repoName" placeholder="例如 yimianqianshi" />
          </label>
        </div>
        <div class="actions">
          <button id="btnAddProject" class="btn primary">添加/复用仓库</button>
        </div>
        <pre id="projectResult" class="log">projectId: (未设置)</pre>
      </section>

      <section class="card stack">
        <h2>Step 2. 提问（runner=agent, module=codex）</h2>
        <div class="grid three">
          <label>Agent Provider（Codex）
            <select id="providerSelect"></select>
          </label>
          <label>Model（可空）
            <input id="modelInput" placeholder="例如 gpt-5-codex" />
          </label>
          <label>Bypass Sandbox
            <select id="sandboxSelect">
              <option value="true">true</option>
              <option value="false">false</option>
            </select>
          </label>
        </div>

        <label>提问内容
          <textarea id="promptInput" rows="8" placeholder="先点击下方“载入本地仓库提问建议 Agent Prompt”"></textarea>
        </label>

        <div class="actions">
          <button id="btnRunAdvisor" class="btn primary">一键运行提问建议 Agent</button>
          <button id="btnAdvisorPrompt" class="btn">载入本地仓库提问建议 Agent Prompt</button>
          <button id="btnAsk" class="btn primary">发送提问</button>
        </div>
        <pre id="askResult" class="log">等待执行...</pre>
      </section>
    </section>

    <section id="tab-research" class="tab-panel">
      <section class="card stack">
        <h2>全球产品分类归纳（含 GitHub）</h2>
        <p class="muted-note">
          基于公开信息整理，聚焦与你当前“本地仓库提问工作台”需求最相关的产品赛道。
        </p>
        <div id="marketMeta" class="meta-chip"></div>
        <div id="marketCategories" class="category-grid"></div>
      </section>

      <section class="card stack">
        <h2>根据需求文档生成：目标项目与名称</h2>
        <div id="targetProject" class="target-project"></div>
      </section>

      <section class="card stack">
        <h2>数据来源（官方/仓库）</h2>
        <div id="marketSources" class="source-list"></div>
      </section>
    </section>
  </main>

  <script src="./app.js?v=2"></script>
</body>
</html>
